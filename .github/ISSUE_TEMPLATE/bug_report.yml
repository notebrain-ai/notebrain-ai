name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: NoteBrain version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (desktop)
        - Windows (desktop)
        - Linux (desktop)
        - Web (app.notebrain.ai)
    validations:
      required: true

  - type: dropdown
    id: editor
    attributes:
      label: Which editor is affected?
      options:
        - Rich Text
        - Canvas
        - Kanban
        - Table
        - Todo
        - Gantt
        - Mind Map
        - Timeline
        - Slides
        - Audio Transcript
        - AI Chat
        - Search
        - Graph View
        - Settings
        - Other / General
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a note of type ...
        2. Click on ...
        3. See error
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      placeholder: Drag and drop screenshots here if helpful.
    validations:
      required: false
